name: Observe (temporary high-freq)

on:
  schedule:
    # Beijing 18:00 = UTC 10:00
    - cron: '0 10 * * *'
    # Beijing 20:00 = UTC 12:00
    - cron: '0 12 * * *'
    # Beijing 22:00 = UTC 14:00
    - cron: '0 14 * * *'
    # Beijing 24:00 (next day 00:00) = UTC 16:00
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch tweets (observe mode)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OBSERVE_MODE: "1"
        run: python fetch_tweets.py

      - name: Commit observe data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/observe/ data/observe_seen_urls.json
          if git diff --staged --quiet; then
            echo "No new observe data"
          else
            git commit -m "observe: $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi

      - name: Send observe results to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OBSERVE_MODE: "1"
        run: python send_telegram.py
