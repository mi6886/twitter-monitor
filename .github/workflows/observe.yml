name: Observe (temporary high-freq)

on:
  schedule:
    # Every 2 hours UTC: 01,03,05,07,09,13,15,17,19,21
    # (skip 11 and 23 which overlap with the official workflow)
    - cron: '0 1,3,5,7,9,13,15,17,19,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch tweets (observe mode)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OBSERVE_MODE: "1"
        run: python fetch_tweets.py

      - name: Commit observe data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/observe/ data/seen_urls.json
          if git diff --staged --quiet; then
            echo "No new observe data"
          else
            git commit -m "observe: $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi

      - name: Send observe results to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OBSERVE_MODE: "1"
        run: python send_telegram.py
