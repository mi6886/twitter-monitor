name: Fetch AI/Tech Tweets

on:
  schedule:
    # Run at 7:00 AM Beijing time (23:00 UTC previous day)
    - cron: '0 23 * * *'
    # Run at 7:00 PM Beijing time (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch tweets from Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python fetch_tweets.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "data: fetch tweets $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
