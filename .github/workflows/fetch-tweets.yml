name: Fetch AI/Tech Tweets

on:
  schedule:
    # Morning run, targeting ~6:00 AM Beijing. Nominal 21:17 UTC = 5:17 AM
    # Beijing; GitHub cron typically fires 30-60 min late (worst near 00:00
    # UTC — the old 23:00 slot consistently ran ~1h late, landing ~8 AM), so
    # an earlier off-peak minute lands the actual run around 6 AM.
    - cron: '17 21 * * *'
    # Run at 7:00 PM Beijing time (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Skip Apify fetch + commit (use to resend Telegram from committed data without re-fetching)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch tweets from Apify
        if: ${{ inputs.skip_fetch != 'true' }}
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python fetch_tweets.py

      # Official RSS sources (blogs/news/changelogs). Free HTTP, no API keys,
      # not LLM-scored — feeds the dashboard's 官方源 tab. Resilient per-feed,
      # so a single broken feed won't fail the run.
      - name: Fetch official RSS sources
        if: ${{ inputs.skip_fetch != 'true' }}
        run: python fetch_rss.py

      # Self-heal: re-score any recent run left >=50% LLM-fallback by a transient
      # OpenRouter outage, using the now-healthy API + preserved raw-*.json.
      # Heals past runs on this healthy run; guarded so it never thrashes credits.
      - name: Self-heal high-fallback scores
        if: ${{ inputs.skip_fetch != 'true' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python heal_scores.py

      - name: Commit and push results
        if: ${{ inputs.skip_fetch != 'true' }}
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "data: fetch tweets $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi

      - name: Send to Telegram
        if: ${{ vars.TELEGRAM_ENABLED == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram.py

      - name: Persist Telegram sent log
        run: |
          if [ -f data/telegram_sent.json ]; then
            git add data/telegram_sent.json
            if git diff --staged --quiet; then
              echo "No sent log changes"
            else
              # Pull any commits that landed during this run (e.g. sync push)
              # before we try to push our own.
              git pull --rebase origin main || true
              git commit -m "data: update telegram sent log"
              git push
            fi
          else
            echo "No telegram_sent.json to persist"
          fi

      # NOTE: This step runs AFTER Telegram on purpose — if the sync fails
      # (missing token, Render hiccup, etc.) Telegram is still delivered.
      # continue-on-error keeps the job green so tomorrow's cron still fires;
      # the next run backfills because we cp all final-*/review-* every time.
      - name: Sync tweets to ai-intel-hub (new website)
        continue-on-error: true
        env:
          AI_INTEL_HUB_TOKEN: ${{ secrets.AI_INTEL_HUB_TOKEN }}
        run: |
          if [ -z "$AI_INTEL_HUB_TOKEN" ]; then
            echo "::warning::AI_INTEL_HUB_TOKEN secret not set — skipping sync to new website"
            exit 0
          fi
          set -e
          TMP="$RUNNER_TEMP/ai-intel-hub"
          git clone --depth 1 \
            "https://x-access-token:${AI_INTEL_HUB_TOKEN}@github.com/mi6886/ai-intel-hub.git" \
            "$TMP"
          DEST="$TMP/public/twitter-data"
          mkdir -p "$DEST"
          # Copy only final-* and scored-* JSONs (not raw-*, candidate-*, seen_urls, telegram_sent)
          cp -v data/final-*.json "$DEST/" 2>/dev/null || true
          cp -v data/scored-*.json "$DEST/" 2>/dev/null || true
          cd "$TMP"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/twitter-data/
          if git diff --staged --quiet; then
            echo "ai-intel-hub: no new twitter data to sync"
          else
            git commit -m "data(twitter): sync $(date -u +%Y-%m-%dT%H:%M) from twitter-monitor"
            git push
          fi

      # Health check runs LAST, after data is already committed/pushed, so a
      # failure here only fires an alert email (GitHub notifies on failed
      # scheduled runs) without losing the run's data. Triggers when the LLM
      # scoring collapsed to fallback (score=30/keep) for most tweets — the
      # signature of an OpenRouter outage (402/403/credits/key-limit) that
      # otherwise looks "successful" and went undetected for 6 days in June.
      - name: Alert if LLM scoring failed (high fallback rate)
        if: ${{ inputs.skip_fetch != 'true' }}
        run: |
          python - <<'PY'
          import glob, json, os, sys
          files = glob.glob("data/scored-*.json")
          if not files:
              print("No scored files found — skipping health check")
              sys.exit(0)
          latest = max(files, key=os.path.getmtime)
          d = json.load(open(latest))
          scored = d.get("scored_count", 0)
          fb = d.get("fallback_count", 0)
          rate = (fb / scored) if scored else 0.0
          print(f"{os.path.basename(latest)}: fallback {fb}/{scored} = {rate:.0%}")
          THRESHOLD = 0.8
          if scored and rate >= THRESHOLD:
              print(f"::error::LLM scoring fallback rate {rate:.0%} (>= {THRESHOLD:.0%}) "
                    f"in {os.path.basename(latest)}. Scores defaulted to 30/keep — "
                    f"likely OpenRouter outage (402/403/credits/key spending limit). "
                    f"Check OpenRouter credits & key limit, then re-score from raw-*.json.")
              sys.exit(1)
          print("Health check passed.")
          PY
